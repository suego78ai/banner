<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Banner Studio</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Fabric.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
  <div class="app-container">
    
    <!-- Left Panel: AI Generator -->
    <aside class="panel left-panel">
      <div class="panel-header">
        <h2>저장소 로고 추가</h2>
        <p>프로젝트 'jpg' 폴더 내의 로고를 추가합니다.</p>
      </div>
      
      <div class="input-group" style="margin-bottom: 2rem;">
        <select id="logoSelect" style="padding: 0.5rem; background: rgba(15, 23, 42, 0.6); border-radius: 8px; border: 1px solid var(--panel-border); color: var(--text-primary); width: 100%; cursor: pointer; margin-bottom: 0.75rem;">
          <option value="" disabled selected>로고 파일을 선택하세요...</option>
        </select>
        <div style="display: flex; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 0.75rem; min-height: 50px; align-items: center;">
          <img id="logoPreview" style="display: none; max-width: 100%; max-height: 100px; border-radius: 4px; padding: 0.5rem;" alt="Logo Preview" />
          <span id="logoPreviewPlaceholder" style="color: var(--text-secondary); font-size: 0.8rem;">미리보기</span>
        </div>
        <button id="addLogoBtn" class="secondary-btn">캔버스에 로고 추가</button>
      </div>

      <div class="panel-header">
        <h2>AI 디자인 생성</h2>
        <p>원하는 테마와 느낌을 입력하세요.</p>
      </div>
      
      <div class="input-group">
        <textarea id="promptInput" placeholder="예: 우주 배경의 몽환적인 파란색 테마, 빛나는 별..."></textarea>
        <button id="generateBtn" class="primary-btn">디자인 생성하기</button>
      </div>

      <div class="gallery-container">
        <h3>생성된 시안 (클릭하여 편집)</h3>
        <div id="loadingIndicator" class="hidden">
          <div class="spinner"></div>
          <p>AI가 디자인을 구상 중입니다...</p>
        </div>
        <div class="gallery" id="designGallery">
          <!-- Images will be populated here -->
        </div>
      </div>
    </aside>

    <!-- Center Panel: Canvas Area -->
    <main class="panel center-panel">
      <div class="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
      </div>
      
      <div class="canvas-controls">
        <p class="instruction">
          <span class="icon">✨</span> 
          이미지를 클릭하면 크기 조절과 회전이 가능합니다. (Delete 키로 삭제 가능)
        </p>
        <div class="action-buttons">
            <button id="addTextBtn" class="secondary-btn">텍스트 추가</button>
            <button id="deleteObjBtn" class="danger-btn">선택 삭제</button>
            <button id="clearCanvasBtn" class="danger-btn">전체 초기화</button>
        </div>
      </div>
    </main>

    <!-- Right Panel: Size & Export -->
    <aside class="panel right-panel">
      <div class="panel-header">
        <h2>캔버스 설정</h2>
      </div>

      <div class="setting-group">
        <label for="presetSize">선택</label>
        <select id="presetSize">
          <option value="" disabled selected>사이즈를 선택하세요</option>
          <option value="5000x900">현수막 (비율 500x90)</option>
          <option value="600x1800">X배너 (비율 60x180)</option>
          <option value="1240x1754">공고문 (A4 비율)</option>
          <option value="2480x3508">포스터 (A2 비율)</option>
          <option value="1200x1800">입간판(안내) (비율 60x90)</option>
          <option value="1800x900">상금(기부금)보드 (비율 90x45)</option>
          <option value="custom">직접 입력</option>
        </select>
      </div>

      <div class="setting-group size-inputs">
        <div class="input-col">
          <label for="canvasWidth">가로 (px)</label>
          <input type="number" id="canvasWidth" value="1920">
        </div>
        <div class="icon-cross">×</div>
        <div class="input-col">
          <label for="canvasHeight">세로 (px)</label>
          <input type="number" id="canvasHeight" value="1080">
        </div>
      </div>
      <button id="applySizeBtn" class="secondary-btn">사이즈 적용</button>

      <div class="export-section">
        <button id="exportBtn" class="primary-btn export-btn">
          <span>고해상도 다운로드</span>
          <span class="export-icon">↓</span>
        </button>
      </div>
    </aside>

  </div>

  <script src="app.js"></script>
</body>
</html>
