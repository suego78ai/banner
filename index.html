<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Banner Studio</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;700&family=Black+Han+Sans&family=Jua&family=Do+Hyeon&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <!-- Fabric.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
  <div class="app-container">
    
    <!-- Left Panel: Canvas & AI -->
    <aside class="panel left-panel">
      <div class="panel-header">
        <h2>캔버스 설정</h2>
      </div>

      <div class="setting-group">
        <label for="categorySelect">유형 선택</label>
        <select id="categorySelect">
          <option value="" disabled selected>제작물 유형을 선택하세요</option>
          <option value="banner">현수막</option>
          <option value="xbanner">X배너</option>
          <option value="notice">공고문</option>
          <option value="poster">포스터</option>
          <option value="signboard">입간판(안내)</option>
          <option value="prize">상금(기부금)</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="presetSize">상세 사이즈 선택</label>
        <select id="presetSize" disabled>
          <option value="" disabled selected>먼저 유형을 선택하세요</option>
        </select>
      </div>

      <div class="panel-header" style="margin-top: 1.5rem;">
        <h2>AI 디자인 생성</h2>
        <p>원하는 테마와 느낌을 입력하세요.</p>
      </div>
      
      <div class="input-group">
        <textarea id="promptInput" placeholder="예: 우주 배경의 몽환적인 파란색 테마, 가로형 현수막 배경으로 사용할 거니까 글씨 없이 공간을 비워줘..." style="margin-bottom: 0.5rem;"></textarea>
        <button id="generateBtn" class="primary-btn">디자인 생성하기 (Gemini 열기)</button>
      </div>

      <div class="gallery-container">
        <h3>제미나이에서 생성한 이미지 불러오기</h3>
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.75rem; line-height: 1.4;">
          '디자인 생성하기'를 누르면 입력하신 내용이 자동으로 복사되며 제미나이가 열립니다. 제미나이에서 이미지를 다운받은 뒤 아래 버튼을 눌러 배경으로 지정하세요.
        </p>
        <input type="file" id="localBgUpload" accept="image/*" style="display: none;" />
        <button id="uploadBgBtn" class="secondary-btn" style="background: rgba(15, 23, 42, 0.6); border: 1px solid var(--panel-border);">PC에서 다운로드한 이미지 선택</button>
      </div>

      <div class="export-section">
        <button id="exportBtn" class="primary-btn export-btn">
          <span>고해상도 다운로드</span>
          <span class="export-icon">↓</span>
        </button>
      </div>
    </aside>

    <!-- Center Panel: Canvas Area -->
    <main class="panel center-panel">
      <div class="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
      </div>
      
      <div class="canvas-controls">
        <p class="instruction">
          <span class="icon">✨</span> 
          이미지를 클릭하면 크기 조절과 회전이 가능합니다. (Delete 키로 삭제 가능)
        </p>
        <div class="action-buttons">
            <button id="deleteObjBtn" class="danger-btn">선택 삭제</button>
            <button id="clearCanvasBtn" class="danger-btn">전체 초기화</button>
        </div>
      </div>
    </main>

    <!-- Right Panel: Logo, Event Info, Text -->
    <aside class="panel right-panel">
      <div class="panel-header">
        <h2>저장소 로고 추가</h2>
        <p>프로젝트 'jpg' 폴더 내의 로고를 추가합니다.</p>
      </div>
      
      <div class="input-group" style="margin-bottom: 2rem;">
        <select id="logoSelect" style="padding: 0.5rem; background: rgba(15, 23, 42, 0.6); border-radius: 8px; border: 1px solid var(--panel-border); color: var(--text-primary); width: 100%; cursor: pointer; margin-bottom: 0.75rem;">
          <option value="" disabled selected>로고 파일을 선택하세요...</option>
        </select>
        <div style="display: flex; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 0.75rem; min-height: 50px; align-items: center;">
          <img id="logoPreview" style="display: none; max-width: 100%; max-height: 100px; border-radius: 4px; padding: 0.5rem;" alt="Logo Preview" />
          <span id="logoPreviewPlaceholder" style="color: var(--text-secondary); font-size: 0.8rem;">미리보기</span>
        </div>
        <button id="addLogoBtn" class="secondary-btn">캔버스에 로고 추가</button>
      </div>

      <div class="panel-header" style="margin-top: 1.5rem;">
        <h2>행사 정보 추가</h2>
      </div>

      <div class="setting-group" style="margin-bottom: 1.5rem;">
        <label for="eventTitleInput">행사 제목</label>
        <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
          <textarea id="eventTitleInput" placeholder="예: 2026 AI 컨퍼런스&#10;성공적인 행사를 기원합니다" style="flex: 1; min-height: 80px;"></textarea>
        </div>
        <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem;">
          <select id="titleDirectionSelect" style="flex: 1; min-width: 80px; padding: 0.5rem; background: rgba(15, 23, 42, 0.6); border-radius: 8px; border: 1px solid var(--panel-border); color: var(--text-primary); cursor: pointer;">
            <option value="horizontal">가로쓰기</option>
            <option value="vertical">세로쓰기</option>
          </select>
          <select id="titleFontSelect" style="flex: 2; min-width: 130px; padding: 0.5rem; background: rgba(15, 23, 42, 0.6); border-radius: 8px; border: 1px solid var(--panel-border); color: var(--text-primary); cursor: pointer;">
            <option value="Black Han Sans">Black Han Sans (굵은고딕)</option>
            <option value="Inter">Inter (기본)</option>
            <option value="Noto Sans KR">Noto Sans (고딕)</option>
            <option value="Do Hyeon">Do Hyeon (도현체)</option>
            <option value="Jua">Jua (주아체)</option>
            <option value="Nanum Pen Script">Nanum Pen Script (손글씨)</option>
          </select>
          <input type="color" id="titleColorPicker" value="#ffffff" style="flex-shrink: 0; width: 40px; height: 38px; padding: 0; border: none; border-radius: 8px; cursor: pointer; background: transparent;">
        </div>
        <button id="addTitleBtn" class="secondary-btn">제목 캔버스에 추가</button>
      </div>

      <div class="setting-group" style="margin-bottom: 1.5rem;">
        <label for="eventDateInput">행사 일자 / 장소</label>
        <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
          <textarea id="eventDateInput" placeholder="예: 2026. 10. 25 (금)&#10;제 1 대강당" style="flex: 1; min-height: 80px;"></textarea>
        </div>
        <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem;">
          <select id="dateDirectionSelect" style="flex: 1; min-width: 80px; padding: 0.5rem; background: rgba(15, 23, 42, 0.6); border-radius: 8px; border: 1px solid var(--panel-border); color: var(--text-primary); cursor: pointer;">
            <option value="horizontal">가로쓰기</option>
            <option value="vertical">세로쓰기</option>
          </select>
          <select id="dateFontSelect" style="flex: 2; min-width: 130px; padding: 0.5rem; background: rgba(15, 23, 42, 0.6); border-radius: 8px; border: 1px solid var(--panel-border); color: var(--text-primary); cursor: pointer;">
            <option value="Noto Sans KR">Noto Sans (고딕)</option>
            <option value="Inter">Inter (기본)</option>
            <option value="Black Han Sans">Black Han Sans (굵은고딕)</option>
            <option value="Do Hyeon">Do Hyeon (도현체)</option>
            <option value="Jua">Jua (주아체)</option>
            <option value="Nanum Pen Script">Nanum Pen Script (손글씨)</option>
          </select>
          <input type="color" id="dateColorPicker" value="#ffffff" style="flex-shrink: 0; width: 40px; height: 38px; padding: 0; border: none; border-radius: 8px; cursor: pointer; background: transparent;">
        </div>
        <button id="addDateBtn" class="secondary-btn">일자 캔버스에 추가</button>
      </div>

      <div class="panel-header" style="margin-top: 1.5rem;">
        <h2>텍스트 추가 및 편집</h2>
        <p>무료 폰트와 색상을 선택하세요.</p>
      </div>
      <div class="input-group" style="margin-bottom: 1rem;">
        <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem;">
          <select id="fontFamilySelect" style="flex: 1; min-width: 130px; padding: 0.5rem; background: rgba(15, 23, 42, 0.6); border-radius: 8px; border: 1px solid var(--panel-border); color: var(--text-primary); cursor: pointer;">
            <option value="Inter">Inter (기본)</option>
            <option value="Noto Sans KR">Noto Sans (고딕)</option>
            <option value="Black Han Sans">Black Han Sans (굵은고딕)</option>
            <option value="Do Hyeon">Do Hyeon (도현체)</option>
            <option value="Jua">Jua (주아체)</option>
            <option value="Nanum Pen Script">Nanum Pen Script (손글씨)</option>
          </select>
          <input type="color" id="textColorPicker" value="#ffffff" style="flex-shrink: 0; width: 40px; height: 38px; padding: 0; border: none; border-radius: 8px; cursor: pointer; background: transparent;">
        </div>
        <button id="addTextBtn" class="secondary-btn">텍스트 추가</button>
      </div>
    </aside>

  </div>

  <script src="app.js"></script>
</body>
</html>
